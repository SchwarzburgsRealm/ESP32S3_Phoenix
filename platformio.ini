[env:wemos_lolin_s3]
platform = espressif32
board = lolin_s3
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

lib_deps =
    bitbank2/JPEGDEC @ ^1.8.2

build_flags =
    ; === Compiler Optimizations ===
    -O3                          ; Maximum speed optimization
    -ffast-math                  ; Aggressive FP math (safe here, no FP in emulator)
    -fstrict-aliasing            ; Enable strict aliasing optimizations
    -fdata-sections              ; Each data in own section (dead data elimination)
    -ffunction-sections          ; Each function in own section (dead code elimination)
    -funroll-loops               ; Unroll loops (helps tile pixel inner loops)
    -finline-functions           ; Inline small functions aggressively
    -fomit-frame-pointer         ; Free up a register
    -Wl,--gc-sections            ; Linker: garbage collect unused sections

    ; === ESP32-S3 CPU Target ===
    -mtext-section-literals      ; Place literals in text section (Xtensa optimization)
    -mfix-esp32-psram-cache-issue ; Required for PSRAM stability

    ; === PSRAM / Memory ===
    -DBOARD_HAS_PSRAM
    -DFORCE_NO_FAST_MALLOC
    -DUSE_ESP32_MALLOC

    ; === Debug: DISABLE all logging (biggest runtime gain) ===
    -DCORE_DEBUG_LEVEL=0         ; 0=none, was 3=info -> kills ESP_LOG overhead
    -DNDEBUG                     ; Disable assert()

    ; === Arduino / USB ===
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; === Hardware Pins ===
    -DTFT_PIN_MOSI=5
    -DTFT_PIN_SCLK=6
    -DTFT_PIN_CS=7
    -DTFT_PIN_DC=8
    -DTFT_PIN_RST=9
    -DTFT_PIN_MISO=13

; Linker flags for dead code elimination
build_unflags =
    -Og
    -Os
